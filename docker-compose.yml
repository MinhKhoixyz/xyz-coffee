version: '3.8'

services:
  # 🗄️ Database: Microsoft SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: xyz-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=XyzCoffee@1234@.
      - MSSQL_PID=Developer
    volumes:
      - mssql_data:/var/opt/mssql
      - ./sql-scripts:/docker-entrypoint-initdb.d

  redis:
    image: redis:latest
    container_name: xyz-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    restart: always

volumes:
  mssql_data:

networks:
  default:
    name: xyz-network