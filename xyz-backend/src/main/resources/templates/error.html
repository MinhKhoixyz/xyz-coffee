<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        customBlue: '#1d4ed8',
                        customText: '#111827',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white text-gray-800 font-sans h-screen flex items-center justify-center p-6">

<div class="flex flex-col md:flex-row items-center gap-12 md:gap-24 max-w-7xl w-full">
    <div class="flex flex-col items-center md:items-start text-center md:text-left flex-1 order-2 md:order-1">
        <h1 class="text-customText text-6xl md:text-8xl font-bold tracking-tight">404</h1>
        <p class="text-customText text-2xl md:text-3xl font-medium mt-6 md:mt-8">Sorry we couldn't find this page.</p>
        <p class="text-gray-600 text-lg md:text-xl mt-3 md:mt-4">
            But don't worry, you can find plenty of other things on our homepage.
        </p>
        <a th:href="@{/}" class="inline-block px-8 py-3 bg-customBlue text-white text-lg rounded-xl font-medium mt-8 md:mt-10 hover:bg-blue-700 transition duration-300">
            back to homepage
        </a>
    </div>

    <div class="flex-1 order-1 md:order-2">
        <img src="https://loremflickr.com/600/500/siamese-cat-vase-flowers" alt="Hình minh họa con mèo và bình hoa" class="w-full h-auto max-w-lg md:max-w-none mx-auto">
    </div>
</div>

</body>
</html>
