<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sidebar</title>
</head>
<body>

<div th:fragment="sidebar" class="app-sidebar d-flex flex-column bg-white shadow-sm" id="mainSidebar">

    <style>
        .sidebar-item {
            color: #475569;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            border-radius: 8px;
            transition: all 0.2s ease-in-out;
            margin-bottom: 6px;
            padding: 10px 16px;
            text-decoration: none;
        }

        .sidebar-item:hover {
            background-color: #f8fafc;
            color: #0f172a;
        }

        .sidebar-item.active {
            background-color: #f1f5f9;
            color: #0284c7;
        }

        .sidebar-icon {
            font-size: 1.35rem;
            margin-right: 14px;
        }

        .sidebar-sub-item {
            color: #64748b;
            font-size: 0.9rem;
            padding: 8px 16px 8px 46px;
            border-radius: 8px;
            transition: all 0.2s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }

        .sidebar-sub-item:hover {
            color: #0f172a;
            background-color: #f8fafc;
        }

        .sidebar-sub-item.active {
            color: #0284c7;
            background-color: transparent;
        }

        .sidebar-sub-icon {
            font-size: 1.1rem;
            margin-right: 10px;
        }

        /* --- CSS MỚI: HIỆU ỨNG XOAY MŨI TÊN --- */
        .menu-arrow {
            transition: transform 0.3s ease;
        }

        .sidebar-item[aria-expanded="true"] .menu-arrow {
            transform: rotate(-180deg);
        }
    </style>

    <div class="p-4 text-center mb-1 d-none d-lg-block">
        <a th:href="@{/admin/ban-hang}">
            <img th:src="@{/assets/img/system/xyz-logo.jpg}" alt="XYZ Coffee"
                 class="img-fluid protect-img" style="max-width: 90px; opacity: 0.95;"
                 draggable="false" oncontextmenu="return false;"/>
        </a>
    </div>

    <ul class="nav flex-column px-3 mb-auto list-unstyled">

        <li>
            <a th:href="@{/admin/ban-hang}" class="sidebar-item d-flex align-items-center">
                <i class="bx bx-store-alt sidebar-icon"></i>
                <span>Bán hàng (POS)</span>
            </a>
        </li>

        <li>
            <a class="sidebar-item d-flex align-items-center justify-content-between"
               data-bs-toggle="collapse" href="#menuSanPham" role="button" aria-expanded="false"
               aria-controls="menuSanPham">
                <div class="d-flex align-items-center">
                    <i class="bx bx-coffee-togo sidebar-icon"></i>
                    <span>Sản phẩm</span>
                </div>
                <i class="bx bx-chevron-down menu-arrow text-muted"></i>
            </a>

            <div class="collapse" id="menuSanPham" data-bs-parent="#mainSidebar">
                <ul class="list-unstyled mt-1 mb-2">
                    <li>
                        <a th:href="@{/loai-san-pham/hien-thi}" class="sidebar-sub-item">
                            <i class="bx bx-category-alt sidebar-sub-icon"></i> Phân loại
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/san-pham/hien-thi}" class="sidebar-sub-item">
                            <i class="bx bx-list-ul sidebar-sub-icon"></i> Danh sách sản phẩm
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/kich-co/hien-thi}" class="sidebar-sub-item">
                            <i class='bx bx-purchase-tag sidebar-sub-icon'></i> Kích cỡ sản phẩm
                        </a>
                    </li>
                </ul>
            </div>
        </li>

        <li>
            <a th:href="@{/quan-ly-hoa-don}" class="sidebar-item d-flex align-items-center">
                <i class="bx bx-receipt sidebar-icon"></i>
                <span>Hóa đơn</span>
            </a>
        </li>

        <li>
            <a th:href="@{/quan-ly-nhan-vien}" class="sidebar-item d-flex align-items-center">
                <i class="bx bx-group sidebar-icon"></i>
                <span>Nhân viên</span>
            </a>
        </li>
    </ul>

    <div class="p-3 mt-4 mb-2">
        <a th:href="@{/logout}" data-bs-toggle="modal"
           class="sidebar-item d-flex align-items-center" style="color: #ef4444;">
            <i class="bx bx-log-out-circle sidebar-icon"></i>
            <span>Đăng xuất</span>
        </a>
    </div>
</div>

</body>
</html>
