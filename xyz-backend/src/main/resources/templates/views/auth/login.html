<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>XYZ | Đăng nhập hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link th:href="@{/assets/css/style.css}" rel="stylesheet">

    <script>
        const savedTheme = localStorage.getItem('theme');
        const savedSurface = localStorage.getItem('surface');
        const savedPrimary = localStorage.getItem('primaryColor');
        const savedHover = localStorage.getItem('primaryHover');

        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-mode');
        }
        if (savedSurface && savedSurface !== 'slate') {
            document.documentElement.classList.add('surface-' + savedSurface);
        }
        if (savedPrimary && savedHover) {
            document.documentElement.style.setProperty('--primary-color', savedPrimary);
            document.documentElement.style.setProperty('--primary-hover', savedHover);
        }
    </script>
</head>
<body class="login-body">

<div class="layout-config-btn">
    <button class="config-btn" id="themeToggle" onclick="toggleTheme()" title="Đổi giao diện">
        <i class='bx bx-moon' id="themeIcon"></i>
    </button>
    <button class="config-btn" id="settingsToggle" onclick="toggleSidebar()" title="Đổi màu sắc">
        <i class='bx bx-palette'></i>
    </button>
</div>

<div class="layout-config-sidebar" id="configSidebar">
    <button class="sidebar-close" onclick="toggleSidebar()"><i class='bx bx-x'></i></button>
    <h5 class="mb-4">Tùy chỉnh Giao diện</h5>

    <div class="config-section-title">Màu chủ đạo (Primary)</div>
    <div class="color-grid" id="primaryColorGrid"></div>

    <div class="config-section-title">Màu nền (Surface)</div>
    <div class="d-flex gap-2">
        <button class="surface-dot" style="background-color: #0f172a;" onclick="setSurface('slate')" title="Slate"></button>
        <button class="surface-dot" style="background-color: #111827;" onclick="setSurface('gray')" title="Gray"></button>
        <button class="surface-dot" style="background-color: #18181b;" onclick="setSurface('zinc')" title="Zinc"></button>
        <button class="surface-dot" style="background-color: #171717;" onclick="setSurface('neutral')" title="Neutral"></button>
        <button class="surface-dot" style="background-color: #1c1917;" onclick="setSurface('stone')" title="Stone"></button>
    </div>
</div>

<div class="login-wrapper">
    <div class="login-card text-center">
        <img th:src="@{/assets/img/system/xyz-logo.jpg}" alt="Logo XYZ Coffee" class="mb-3 shadow-sm" style="width: 80px; height: 80px; object-fit: cover; border-radius: 50%;">
        <h3 class="fw-bold mb-1">ĐĂNG NHẬP TÀI KHOẢN</h3>

        <p class="text-secondary" style="font-size: 0.95rem;">Bạn chưa có tài khoản? <a href="#" class="theme-link fw-bold">Đăng ký tại đây</a></p>

        <div th:if="${error}" class="alert alert-danger py-2 text-start" role="alert" style="font-size: 0.9rem;">
            <i class='bx bx-error-circle me-1'></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/login}" method="POST" class="text-start">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" placeholder="Nhập tài khoản" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" placeholder="Nhập mật khẩu" required>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-secondary" for="rememberMe" style="font-size: 0.85rem;">
                        Remember me
                    </label>
                </div>
                <a href="#" class="theme-link" style="font-size: 0.85rem;">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById('configSidebar').classList.toggle('active');
    }

    function toggleTheme() {
        const root = document.documentElement;
        const icon = document.getElementById('themeIcon');
        root.classList.toggle('light-mode');

        if(root.classList.contains('light-mode')) {
            icon.classList.replace('bx-moon', 'bx-sun');
            localStorage.setItem('theme', 'light');
        } else {
            icon.classList.replace('bx-sun', 'bx-moon');
            localStorage.setItem('theme', 'dark');
        }
    }

    function setSurface(type) {
        const root = document.documentElement;
        root.classList.remove('surface-slate', 'surface-gray', 'surface-zinc', 'surface-neutral', 'surface-stone');
        if (type !== 'slate') {
            root.classList.add('surface-' + type);
        }
        localStorage.setItem('surface', type);
    }

    function setPrimaryColor(hex, hoverHex) {
        document.documentElement.style.setProperty('--primary-color', hex);
        document.documentElement.style.setProperty('--primary-hover', hoverHex);
        localStorage.setItem('primaryColor', hex);
        localStorage.setItem('primaryHover', hoverHex);
    }

    const primaryColors = [
        { hex: '#f8fafc', hover: '#e2e8f0' }, { hex: '#10b981', hover: '#059669' },
        { hex: '#22c55e', hover: '#16a34a' }, { hex: '#84cc16', hover: '#65a30d' },
        { hex: '#f97316', hover: '#ea580c' }, { hex: '#f59e0b', hover: '#d97706' },
        { hex: '#eab308', hover: '#ca8a04' }, { hex: '#14b8a6', hover: '#0d9488' },
        { hex: '#06b6d4', hover: '#0891b2' }, { hex: '#0ea5e9', hover: '#0284c7' },
        { hex: '#3b82f6', hover: '#2563eb' }, { hex: '#6366f1', hover: '#4f46e5' },
        { hex: '#8b5cf6', hover: '#7c3aed' }, { hex: '#a855f7', hover: '#9333ea' },
        { hex: '#d946ef', hover: '#c026d6' }, { hex: '#ec4899', hover: '#db2777' },
        { hex: '#ef4444', hover: '#dc2626' }
    ];

    const grid = document.getElementById('primaryColorGrid');
    primaryColors.forEach(color => {
        const btn = document.createElement('button');
        btn.className = 'color-dot';
        btn.style.backgroundColor = color.hex;
        btn.onclick = () => setPrimaryColor(color.hex, color.hover);
        grid.appendChild(btn);
    });

    window.onload = () => {
        if(localStorage.getItem('theme') === 'light') {
            const icon = document.getElementById('themeIcon');
            if(icon) icon.classList.replace('bx-moon', 'bx-sun');
        }
    };
</script>
</body>
</html>
