<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-layout :: layout(~{::section})}">
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold text-dark m-0">Quản lý loại sản phẩm</h4>
        </div>
        <div class="d-flex align-items-center gap-2 bg-white px-3 py-2 rounded-pill shadow-sm border">
    <span class="text-muted" style="font-size: 0.9rem;">
        Xin chào, <strong class="text-dark" th:text="${currentFullName != null ? currentFullName : 'Admin'}"></strong>
    </span>

            <img th:src="${currentAvatar != null && !currentAvatar.isEmpty() ? currentAvatar : 'https://ui-avatars.com/api/?name=' + (currentFullName != null ? currentFullName : 'Admin') + '&background=random'}"
                 alt="Avatar"
                 class="rounded-circle"
                 width="32" height="32"
                 style="object-fit: cover;">
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 bg-white overflow-hidden">
        <div class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
            <button class="btn btn-primary shadow-sm fw-medium px-3 d-flex align-items-center gap-1" onclick="openAddModal()">
                <i class='bx bx-plus fs-5'></i> Thêm mới
            </button>

            <form th:action="@{/loai-san-pham/hien-thi}" method="get" class="m-0">
                <div class="input-group input-group-sm" style="width: 300px;">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class='bx bx-search'></i></span>
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control border-start-0 bg-light shadow-none" placeholder="Tìm tên loại sản phẩm...">
                </div>
            </form>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">
                    <tr>
                        <th class="fw-semibold py-3 ps-4" style="width: 25%;">Tên danh mục</th>
                        <th class="fw-semibold py-3" style="width: 35%;">Mô tả</th>
                        <th class="fw-semibold py-3 text-center" style="width: 15%;">Ngày tạo</th>
                        <th class="fw-semibold py-3 text-center" style="width: 15%;">Trạng thái</th>
                        <th class="fw-semibold py-3 text-end pe-4" style="width: 10%;">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody class="border-top-0">
                    <tr th:if="${#lists.isEmpty(listLoaiSanPham)}">
                        <td colspan="5" class="text-center py-5 text-muted">
                            <i class='bx bx-category fs-1 text-light mb-2'></i>
                            <p class="mb-0">Không có dữ liệu.</p>
                        </td>
                    </tr>
                    <tr th:each="lsp : ${listLoaiSanPham}">
                        <td class="ps-4">
                            <span class="text-dark fw-bold fs-6" th:text="${lsp.name}"></span>
                        </td>

                        <td>
                            <div class="text-muted"
                                 style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-size: 0.9rem;"
                                 th:text="${lsp.description}"
                                 th:title="${lsp.description}">
                            </div>
                        </td>

                        <td class="text-center">
                            <span class="text-secondary" style="font-size: 0.9rem;" th:text="${#temporals.format(lsp.createdAt, 'dd/MM/yyyy')}"></span>
                        </td>

                        <td class="text-center">
                            <span th:if="${lsp.isActive}" class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-2 py-1 rounded-2">Đang bán</span>
                            <span th:unless="${lsp.isActive}" class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25 px-2 py-1 rounded-2">Ngừng bán</span>
                        </td>

                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-light text-primary border-0 p-2 me-1"
                                    th:data-id="${lsp.id}"
                                    th:data-name="${lsp.name}"
                                    th:data-desc="${lsp.description}"
                                    th:data-active="${lsp.isActive}"
                                    onclick="openEditModal(this.dataset.id, this.dataset.name, this.dataset.desc, this.dataset.active)"
                                    data-bs-toggle="tooltip" title="Sửa">
                                <i class='bx bx-edit-alt fs-5'></i>
                            </button>
                            <a th:href="@{/loai-san-pham/delete/{id}(id=${lsp.id})}" class="btn btn-sm btn-light text-danger border-0 p-2"
                               data-bs-toggle="tooltip" title="Xóa"
                               onclick="return confirm('Chú ý: Xóa danh mục này có thể ảnh hưởng đến các sản phẩm bên trong. Bạn chắc chắn chứ?');">
                                <i class='bx bx-trash fs-5'></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="loaiSanPhamModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <form th:action="@{/loai-san-pham/save}" th:object="${loaiSanPhamRequest}" method="post">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title fw-bold text-dark" id="modalTitle">Thêm loại sản phẩm</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="modalId" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label fw-medium text-secondary" style="font-size: 0.9rem;">Tên loại <span class="text-danger">*</span></label>
                            <input type="text" class="form-control bg-light border-0" id="modalName" th:field="*{name}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium text-secondary" style="font-size: 0.9rem;">Mô tả</label>
                            <textarea class="form-control bg-light border-0" id="modalDescription" th:field="*{description}" rows="3"></textarea>
                        </div>
                        <div class="mb-3 form-check form-switch mt-4">
                            <input class="form-check-input" type="checkbox" role="switch" id="modalIsActive" th:field="*{isActive}">
                            <label class="form-check-label fw-medium" for="modalIsActive">Đang hoạt động</label>
                        </div>
                    </div>
                    <div class="modal-footer border-top-0 pt-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary px-4 shadow-sm">Lưu lại</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:src="@{/assets/js/loai-san-pham.js}"></script>
</section>
</html>
