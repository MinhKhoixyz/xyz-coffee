<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <title>XYZ COFFEE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link th:href="@{/assets/css/style.css}" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            margin: 0;
            overflow-x: hidden;
        }

        /* -- CẤU TRÚC LAYOUT -- */
        .app-layout { display: flex; min-height: 100vh; }

        .app-sidebar {
            width: 260px; min-width: 260px; height: 100vh;
            position: fixed; top: 0; left: 0;
            overflow-y: auto; z-index: 1000;
            background-color: #ffffff; border-right: 1px solid #e9ecef;
        }
        .app-sidebar::-webkit-scrollbar { width: 5px; }
        .app-sidebar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }

        .app-content {
            flex-grow: 1; margin-left: 260px; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* -- BẢO MẬT & UX -- */
        /* Chống kéo thả, copy, hoặc select ảnh */
        .protect-img {
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none; /* Vô hiệu hóa click phải chuột vào ảnh, nhưng vẫn cho phép click vào thẻ a bao ngoài */
        }

        /* Hiệu ứng xoay mũi tên khi mở menu con */
        .menu-arrow { transition: transform 0.3s ease; }
        .nav-link[aria-expanded="true"] .menu-arrow { transform: rotate(180deg); }
    </style>
</head>
<body>

<div class="app-layout">
    <div th:replace="~{components/admin-sidebar :: sidebar}"></div>

    <div class="app-content p-4">
        <div th:replace="${content}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
